<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motivation Quote Scraper</title>
  <link rel="stylesheet" href="style.css" />
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  display: grid;
  place-items: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 700px;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(14px);
  border-radius: 24px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
}

.badge {
  display: inline-block;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(255, 255, 255, 0.12);
  padding: 8px 12px;
  border-radius: 999px;
  margin-bottom: 16px;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 24px;
}

.quote-box {
  background: rgba(255, 255, 255, 0.06);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 18px;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.quote {
  font-size: 1.4rem;
  line-height: 1.7;
  margin-bottom: 16px;
}

.author {
  font-size: 1rem;
  color: #cbd5e1;
}

.status {
  min-height: 22px;
  margin-bottom: 18px;
  color: #a5b4fc;
  font-size: 0.95rem;
}

.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.btn:hover {
  transform: translateY(-2px);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.primary {
  background: #4f46e5;
  color: #fff;
}

.secondary {
  background: #e2e8f0;
  color: #0f172a;
}

.api-note {
  margin-top: 18px;
  font-size: 0.9rem;
  color: #cbd5e1;
}

code {
  background: rgba(255, 255, 255, 0.12);
  padding: 3px 8px;
  border-radius: 8px;
}

</style>
</head>
<body>
  <main class="app">
    <section class="card">
      <p class="badge">Motivation API Demo</p>

      <h1>Daily Motivation</h1>

      <div class="quote-box">
        <p id="quote" class="quote">Loading quote...</p>
        <p id="author" class="author"></p>
      </div>

      <p id="status" class="status"></p>

      <div class="actions">
        <button id="newQuoteBtn" class="btn primary">New Quote</button>
        <button id="copyBtn" class="btn secondary">Copy Quote</button>
      </div>

      <p class="api-note">
        Public API endpoint: <code>/api/quote</code>
      </p>
    </section>
  </main>

  <script>const quoteEl = document.getElementById('quote')
const authorEl = document.getElementById('author')
const statusEl = document.getElementById('status')
const newQuoteBtn = document.getElementById('newQuoteBtn')
const copyBtn = document.getElementById('copyBtn')

let latestQuoteText = ''

function setLoading(isLoading) {
  newQuoteBtn.disabled = isLoading
  copyBtn.disabled = isLoading

  if (isLoading) {
    statusEl.textContent = 'Loading a new quote...'
  } else {
    statusEl.textContent = ''
  }
}

function renderQuote(data) {
  quoteEl.textContent = data.quote || 'No quote found.'
  authorEl.textContent = data.author ? `— ${data.author}` : ''
  latestQuoteText = data.author
    ? `${data.quote} — ${data.author}`
    : data.quote || ''
  statusEl.textContent = data.cached
    ? 'Loaded from cache.'
    : 'Freshly scraped.'
}

async function loadQuote() {
  try {
    setLoading(true)

    const res = await fetch('/api/quote')

    if (!res.ok) {
      throw new Error('Failed to load quote')
    }

    const data = await res.json()

    if (!data.success) {
      throw new Error(data.error || 'Request was not successful')
    }

    renderQuote(data)
  } catch (error) {
    quoteEl.textContent = 'Something went wrong while loading the quote.'
    authorEl.textContent = ''
    statusEl.textContent = 'Error loading quote.'
  } finally {
    setLoading(false)
  }
}

async function copyQuote() {
  try {
    await navigator.clipboard.writeText(latestQuoteText || quoteEl.textContent)
    statusEl.textContent = 'Quote copied to clipboard.'
  } catch (error) {
    statusEl.textContent = 'Could not copy quote.'
  }
}

newQuoteBtn.addEventListener('click', loadQuote)
copyBtn.addEventListener('click', copyQuote)

loadQuote()
</script>
</body>
</html>
